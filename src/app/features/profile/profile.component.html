<!--Heading (page Title)-->
<div class="bg-gradient-to-br from-primary-600 via-primary-500 to-primary-400 text-white">
    <div class="container mx-auto px-4 py-10 sm:py-12">
        <nav class="flex items-center gap-2 text-sm text-white/70 mb-6"><a
                class="hover:text-white transition-colors duration-200" routerLink="/home">Home</a>
            <span class="text-white/40">/</span>
            <span class="text-white font-medium">My Account</span>
        </nav>

        <div class="flex items-center gap-5">
            <div
                class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
                <i class="fa-solid fa-user text-3xl"></i>
            </div>
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">My Account</h1>
                <p class="text-white/80 mt-1">Manage your addresses and account settings</p>
            </div>
        </div>
    </div>
</div>


<div class="container mx-auto px-4 py-8">
    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
        <!--side bar-->
        <aside class="w-full lg:w-72 shrink-0">
            <nav class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100">
                    <h2 class="font-bold text-gray-900">My Account</h2>
                </div>
                <ul class="p-2">
                    <li>
                        <a routerLink="/profile/addresses" routerLinkActive="bg-primary-50 text-primary-700"
                            [routerLinkActiveOptions]="{ exact: true }" #rlaAddresses="routerLinkActive"
                            [class.hover:text-gray-900]="!rlaAddresses.isActive"
                            [class.hover:bg-gray-50]="!rlaAddresses.isActive"
                            [class.hover:text-gray-600]="!rlaAddresses.isActive"
                            class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group ">
                            <div [class.bg-primary-500]="rlaAddresses.isActive"
                                [class.text-white]="rlaAddresses.isActive" [class.bg-gray-100]="!rlaAddresses.isActive"
                                [class.text-gray-500]="!rlaAddresses.isActive"
                                [class.group-hover:bg-gray-200]="!rlaAddresses.isActive"
                                class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors">
                                <i class="fa-solid fa-location-dot text-sm"></i>
                            </div>
                            <span class="font-medium flex-1">Addresses</span>
                            <i class="fa-solid fa-chevron-right text-xs transition-transform text-gray-400"></i>
                        </a>
                    </li>

                    <li>
                        <a routerLink="/profile/settings" routerLinkActive="bg-primary-50 text-primary-700"
                            [routerLinkActiveOptions]="{ exact: true }" #rlaSettings="routerLinkActive"
                            class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group text-gray-600 hover:bg-gray-50 hover:text-gray-900">
                            <div [class.bg-primary-500]="rlaSettings.isActive" [class.text-white]="rlaSettings.isActive"
                                [class.bg-gray-100]="!rlaSettings.isActive"
                                [class.text-gray-500]="!rlaSettings.isActive"
                                class="w-9 h-9 rounded-lg flex items-center justify-center transition-colors bg-gray-100 text-gray-500 group-hover:bg-gray-200">
                                <i class="fa-solid fa-gear text-sm"></i>
                            </div>
                            <span class="font-medium flex-1">Settings</span>
                            <i class="fa-solid fa-chevron-right text-xs transition-transform text-gray-400"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>
        <main class="flex-1 min-w-0">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
