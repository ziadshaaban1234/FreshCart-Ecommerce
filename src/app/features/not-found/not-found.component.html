<div class="flex flex-col items-center justify-center min-h-screen px-4 bg-gray-50">
    <h1 class="text-6xl font-bold text-primary-500 mb-4">404</h1>
    <h2 class="text-2xl font-semibold text-primary-900 mb-2">Page Not Found</h2>
    <p class="text-gray-600 mb-6">Oops! The page you're looking for doesn't exist.</p>

    <div class="flex gap-4">

        <!-- Go Home Button -->
        <a routerLink="/home"
            class="flex items-center gap-2 bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-lg transition">
            <i class="fas fa-home"></i>
            Go Home
        </a>
        <!-- Go Back Button -->

        <button (click)="goBack()"
            class="flex items-center gap-2 bg-white hover:bg-gray-200 shadow-md text-primary-600 px-6 py-3 rounded-lg transition">
            <i class="fas fa-arrow-left"></i>
            Go Back
        </button>



    </div>
</div>
