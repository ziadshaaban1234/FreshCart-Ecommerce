@if ( ordersList().length) {
<div class="container mx-auto px-4 py-8">
    <div class="mb-8">
        <nav class="flex items-center gap-2 text-sm text-gray-500 mb-6">
            <a class="hover:text-primary-600 transition" routerLink="/home">Home</a>
            <span class="text-gray-300">/</span><span class="text-gray-900 font-medium">My
                Orders</span>
        </nav>
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div
                    class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-lg shadow-primary-500/25">
                    <i class="fa-solid fa-box text-2xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">My Orders</h1>
                    <p class="text-gray-500 text-sm mt-0.5">Track and manage your pew order</p>
                </div>
            </div>
            <a class="self-start sm:self-auto text-primary-600 hover:text-primary-700 font-medium flex items-center gap-2 px-4 py-2 rounded-xl hover:bg-primary-50 transition-all text-sm"
                routerLink="/shop">
                <i class="fa-solid fa-bag-shopping text-xs"></i>
                Continue Shopping</a>
        </div>
    </div>

    <!--Orders-->
    <div class="space-y-4">
        @for (order of ordersList(); track order._id) {
        <!--  order card -->
        <app-single-order [orderData]="order"></app-single-order>
        }
    </div>
</div>

}
@if( ordersList().length===0){
<!-- Empty Orders -->
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="max-w-sm text-center">
        <div class="w-24 h-24 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-box-open text-4xl text-gray-400"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-2">No orders yet</h2>
        <p class="text-gray-500 mb-8 text-sm leading-relaxed">When you place orders, they'll appear here<br>so you can
            track them.</p><a
            class="inline-flex items-center justify-center gap-2 bg-primary-600 hover:bg-primary-700 text-white py-3.5 px-8 rounded-xl font-semibold transition-all shadow-lg shadow-primary-600/20 w-full sm:w-auto"
            routerLink="/shop">

            <i class="fa-solid fa-bag-shopping"></i>Start Shopping</a>
    </div>
</div>
}
